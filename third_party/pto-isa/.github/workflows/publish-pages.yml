name: Publish GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.svg"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.webp"
      - "**/*.bnf"
      - "docs/mkdocs/**"
      - ".github/workflows/publish-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/mkdocs/requirements.txt

      - name: Build static site
        run: |
          site_dir="${GITHUB_WORKSPACE}/_site"
          python -m mkdocs build -f docs/mkdocs/mkdocs.yml -d "${site_dir}" --clean
          touch "${site_dir}/.nojekyll"

      - name: Write generated-site README
        run: |
          site_dir="${GITHUB_WORKSPACE}/_site"
          cat > "${site_dir}/README.md" <<'EOF'
          # PTO-ISA GitHub Pages

          This repository is generated from the MkDocs source in `PTO-ISA/pto-isa`.

          Source of truth:
          - Repository: https://github.com/PTO-ISA/pto-isa
          - MkDocs config: `docs/mkdocs/mkdocs.yml`

          Do not edit this repository manually. Changes will be overwritten by the publish workflow.
          EOF

      - name: Publish to PTO-ISA/pto-isa.github.io
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PTO_ISA_PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -z "${PAGES_DEPLOY_TOKEN}" ]; then
            echo "Missing PTO_ISA_PAGES_DEPLOY_TOKEN secret." >&2
            exit 1
          fi

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          git clone "https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/PTO-ISA/pto-isa.github.io.git" "${workdir}/site-repo"
          cd "${workdir}/site-repo"
          git checkout -B main

          rsync -a --delete --exclude '.git/' "${GITHUB_WORKSPACE}/_site/" "${workdir}/site-repo/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No site changes to publish."
            exit 0
          fi

          git commit -m "Publish site from PTO-ISA/pto-isa@${GITHUB_SHA}"
          git push origin main
