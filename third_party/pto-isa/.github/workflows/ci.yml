name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Determine pre-commit diff range
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "from_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin main
          echo "from_ref=$(git merge-base HEAD origin/main)" >> "$GITHUB_OUTPUT"
          echo "to_ref=HEAD" >> "$GITHUB_OUTPUT"

      - name: Run pre-commit
        run: |
          pre-commit run \
            --show-diff-on-failure \
            --color=always \
            --from-ref "${{ steps.diff.outputs.from_ref }}" \
            --to-ref "${{ steps.diff.outputs.to_ref }}"

  docs-build:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build docs site
        run: |
          cmake -S docs -B build/docs
          cmake --build build/docs --target pto_docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: build/docs/site
          if-no-files-found: error

  unit-tests:
    name: CPU SIM smoke tests
    needs: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run CPU SIM smoke testcase
        run: |
          python3 tests/run_cpu.py \
            --testcase tadd \
            --gtest_filter 'TADDTest.case_float_64x64_64x64' \
            --generator Ninja \
            --build-dir build/cpu_smoke_tadd \
            --clean

  system-tests:
    name: CPU SIM full ST
    needs: [pre-commit, docs-build, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run CPU SIM ST suite
        run: |
          bash tests/run_cpu_tests.sh --generator Ninja --build-folder build/cpu_st_ci
