<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="TGEMV_MX tile operation diagram">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#1B7F91"/></marker>
</defs>
<style>
svg { font-family: Arial, Helvetica, sans-serif; }
.title { font-size: 30px; font-weight: 700; fill: #0f172a; }
.subtitle { font-size: 14px; fill: #334155; }
.meta { font-size: 12px; fill: #64748b; }
.frame { fill: white; }
.panel { fill: #E8F8FB; stroke: #e2e8f0; stroke-width: 1.5; rx: 14; }
.tileLabel { font-size: 14px; font-weight: 700; fill: #0f172a; }
.tileBorder { fill: none; stroke: #475569; stroke-width: 1.5; }
.cell { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; }
.cellA { fill: #ecfeff; }
.cellAS { fill: #fef3c7; }
.cellB { fill: #eff6ff; }
.cellBS { fill: #fde68a; }
.cellC { fill: #f5f3ff; }
.cellText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 11px; fill: #0f172a; }
.arrow { stroke-width: 1.5; fill: none; stroke-linejoin: round; stroke-linecap: round; marker-end: url(#arrow); }
.procBox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
.procText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #0f172a; }
.opBox { fill: #ffffff; stroke: #1B7F91; stroke-width: 2; rx: 12; }
.opText { font-size: 13px; font-weight: 800; fill: #0f172a; }
.note { font-size: 12px; fill: #334155; }
</style>
<rect x="0" y="0" width="1200" height="760" class="frame" />
<rect x="24" y="24" width="1152" height="712" class="panel" />
<text x="40" y="46" class="title">TGEMV_MX</text>
<text x="40" y="72" class="subtitle">GEMV with left/right scale tiles for mixed-precision or quantized compute.</text>
<text x="40" y="92" class="meta">Conceptually the same GEMV core, with additional scale operands participating in target-defined reconstruction/scaling.</text>
<line x1="36" y1="104" x2="1164" y2="104" stroke="#e2e8f0" stroke-width="1.5" />

<text x="190" y="160" class="tileLabel" text-anchor="middle">A / left tile (1 × K)</text>
<rect x="60" y="185" width="260" height="74" class="tileBorder" />
<rect x="60" y="185" width="52" height="74" class="cell cellA" /><rect x="112" y="185" width="52" height="74" class="cell cellA" /><rect x="164" y="185" width="52" height="74" class="cell cellA" /><rect x="216" y="185" width="52" height="74" class="cell cellA" /><rect x="268" y="185" width="52" height="74" class="cell cellA" />
<text x="86" y="226" class="cellText" text-anchor="middle">A₀₀</text><text x="138" y="226" class="cellText" text-anchor="middle">A₀₁</text><text x="190" y="226" class="cellText" text-anchor="middle">…</text><text x="242" y="226" class="cellText" text-anchor="middle">A₀,k</text><text x="294" y="226" class="cellText" text-anchor="middle">A₀,K-1</text>

<text x="190" y="320" class="tileLabel" text-anchor="middle">A_scale / left scale tile</text>
<rect x="90" y="345" width="200" height="56" class="tileBorder" />
<rect x="90" y="345" width="50" height="56" class="cell cellAS" /><rect x="140" y="345" width="50" height="56" class="cell cellAS" /><rect x="190" y="345" width="50" height="56" class="cell cellAS" /><rect x="240" y="345" width="50" height="56" class="cell cellAS" />
<text x="115" y="378" class="cellText" text-anchor="middle">Sa₀</text><text x="165" y="378" class="cellText" text-anchor="middle">Sa₁</text><text x="215" y="378" class="cellText" text-anchor="middle">…</text><text x="265" y="378" class="cellText" text-anchor="middle">Sa</text>

<text x="920" y="160" class="tileLabel" text-anchor="middle">B / right tile (K × N)</text>
<rect x="740" y="175" width="320" height="180" class="tileBorder" />
<rect x="740" y="175" width="64" height="45" class="cell cellB" /><rect x="804" y="175" width="64" height="45" class="cell cellB" /><rect x="868" y="175" width="64" height="45" class="cell cellB" /><rect x="932" y="175" width="64" height="45" class="cell cellB" /><rect x="996" y="175" width="64" height="45" class="cell cellB" />
<rect x="740" y="220" width="64" height="45" class="cell cellB" /><rect x="804" y="220" width="64" height="45" class="cell cellB" /><rect x="868" y="220" width="64" height="45" class="cell cellB" /><rect x="932" y="220" width="64" height="45" class="cell cellB" /><rect x="996" y="220" width="64" height="45" class="cell cellB" />
<rect x="740" y="265" width="64" height="45" class="cell cellB" /><rect x="804" y="265" width="64" height="45" class="cell cellB" /><rect x="868" y="265" width="64" height="45" class="cell cellB" /><rect x="932" y="265" width="64" height="45" class="cell cellB" /><rect x="996" y="265" width="64" height="45" class="cell cellB" />
<rect x="740" y="310" width="64" height="45" class="cell cellB" /><rect x="804" y="310" width="64" height="45" class="cell cellB" /><rect x="868" y="310" width="64" height="45" class="cell cellB" /><rect x="932" y="310" width="64" height="45" class="cell cellB" /><rect x="996" y="310" width="64" height="45" class="cell cellB" />
<text x="772" y="202" class="cellText" text-anchor="middle">B₀₀</text><text x="836" y="202" class="cellText" text-anchor="middle">B₀₁</text><text x="900" y="202" class="cellText" text-anchor="middle">…</text><text x="964" y="202" class="cellText" text-anchor="middle">B₀,j</text>
<text x="964" y="247" class="cellText" text-anchor="middle">B₁,j</text><text x="900" y="292" class="cellText" text-anchor="middle">⋮</text><text x="964" y="337" class="cellText" text-anchor="middle">Bₖ,j</text>

<text x="920" y="420" class="tileLabel" text-anchor="middle">B_scale / right scale tile</text>
<rect x="820" y="445" width="200" height="56" class="tileBorder" />
<rect x="820" y="445" width="50" height="56" class="cell cellBS" /><rect x="870" y="445" width="50" height="56" class="cell cellBS" /><rect x="920" y="445" width="50" height="56" class="cell cellBS" /><rect x="970" y="445" width="50" height="56" class="cell cellBS" />
<text x="845" y="478" class="cellText" text-anchor="middle">Sb₀</text><text x="895" y="478" class="cellText" text-anchor="middle">Sb₁</text><text x="945" y="478" class="cellText" text-anchor="middle">…</text><text x="995" y="478" class="cellText" text-anchor="middle">Sb</text>

<rect x="460" y="315" width="160" height="60" class="opBox" />
<text x="540" y="342" class="opText" text-anchor="middle">TGEMV_MX</text>
<text x="540" y="360" class="note" text-anchor="middle">A, A_scale, B, B_scale</text>
<path d="M 320 220 C 390 220, 395 330, 460 330" class="arrow" stroke="#1B7F91" />
<path d="M 290 373 C 390 373, 390 345, 460 345" class="arrow" stroke="#d97706" />
<path d="M 740 265 C 690 265, 680 330, 620 330" class="arrow" stroke="#1B7F91" />
<path d="M 820 473 C 710 473, 710 360, 620 360" class="arrow" stroke="#d97706" />

<text x="540" y="575" class="tileLabel" text-anchor="middle">C / acc tile (1 × N)</text>
<rect x="380" y="450" width="320" height="74" class="tileBorder" />
<rect x="380" y="450" width="64" height="74" class="cell cellC" /><rect x="444" y="450" width="64" height="74" class="cell cellC" /><rect x="508" y="450" width="64" height="74" class="cell cellC" /><rect x="572" y="450" width="64" height="74" class="cell cellC" /><rect x="636" y="450" width="64" height="74" class="cell cellC" />
<text x="412" y="491" class="cellText" text-anchor="middle">C₀</text><text x="476" y="491" class="cellText" text-anchor="middle">C₁</text><text x="540" y="491" class="cellText" text-anchor="middle">…</text><text x="604" y="491" class="cellText" text-anchor="middle">Cⱼ</text><text x="668" y="491" class="cellText" text-anchor="middle">Cₙ</text>
<path d="M 540 375 L 540 450" class="arrow" stroke="#1B7F91" />

<rect x="50" y="700" width="1100" height="34" class="procBox" />
<text x="68" y="723" class="procText">Conceptually: GEMV core uses A and B, while A_scale and B_scale provide additional target-defined scale/reconstruction information.</text>
</svg>
