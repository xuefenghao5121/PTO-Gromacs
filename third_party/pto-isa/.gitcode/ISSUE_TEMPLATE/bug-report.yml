    attributes:
      value: |
        Thanks for sending an issue! Please fill in the following template to help quickly solve your problem.
  - type: textarea
    attributes:
      label: 发生了什么问题？
      description:
    validations:
      required: true

  - type: textarea
    attributes:
      label: 期望的行为是什么？
      description:
    validations:
      required: true

  - type: textarea
    attributes:
      label: 如何复现该缺陷？
      description:
    validations:
      required: true

  - type: textarea
    attributes:
      label: 环境&版本信息
      description:
    validations:
      required: true

  - type: textarea
    attributes:
      label: 其他
      description:
